<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Lab GK - Korkociag i Piramida</title>
<style>
  body { margin: 0; background: #1a1a1a; color: #ddd; font-family: sans-serif; }
  canvas { display: block; margin: 10px auto; background: #111; }
  #info { text-align: center; padding: 8px; }
</style>
</head>
<body>
<div id="info">
  Klawisze: <b>1</b> - Korkociag (oś Y, 4 obroty, zielony) | <b>2</b> - Piramida (podstawa kwadratowa)<br>
  Obrót: strzałki, PageUp, PageDown, Home (reset)
</div>
<canvas id="c" width="800" height="600"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
<script>
const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl");
gl.enable(gl.DEPTH_TEST);

const VS = `
attribute vec3 aPos;
attribute vec3 aCol;
attribute float aPS;
uniform mat4 uMVP;
varying vec3 vCol;
void main() {
  gl_Position = uMVP * vec4(aPos, 1.0);
  gl_PointSize = aPS;
  vCol = aCol;
}`;

const FS = `
precision mediump float;
varying vec3 vCol;
void main() { gl_FragColor = vec4(vCol, 1.0); }`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);
const uMVP = gl.getUniformLocation(prog, "uMVP");
const aPos = gl.getAttribLocation(prog, "aPos");
const aCol = gl.getAttribLocation(prog, "aCol");
const aPS  = gl.getAttribLocation(prog, "aPS");

function makeVAO(data, mode, count) {
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.STATIC_DRAW);
  return { buf, mode, count };
}
function bindBuf(o) {
  gl.bindBuffer(gl.ARRAY_BUFFER, o.buf);
  const stride = 7 * 4;
  gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, stride, 0);
  gl.enableVertexAttribArray(aCol); gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, stride, 12);
  gl.enableVertexAttribArray(aPS);  gl.vertexAttribPointer(aPS,  1, gl.FLOAT, false, stride, 24);
}

// ── Korkociag: N=4 obroty wokol osi Y, kolor zielony, punkty rosnace ──
const N = 4;
const corkData = [];
const steps = 400;
for (let i = 0; i <= steps; i++) {
  const t = i / steps;
  const angle = t * N * 2 * Math.PI;
  const r = 0.4;
  const x = r * Math.cos(angle);
  const y = -0.8 + t * 1.6;
  const z = r * Math.sin(angle);
  const ps = 2.0 + t * 12.0;
  corkData.push(x, y, z, 0.0, 0.7, 0.0, ps);
}
const corkVAO = makeVAO(corkData, gl.POINTS, steps + 1);

// ── Piramida: podstawa N-katna (N=4), 2 wachlarze ──
function makePyramid(n) {
  const r = 0.6, h = 0.9;
  // Wachlarz 1: podstawa (centrum w dol, wierzcholki na okregu)
  const base = [0, -h/2, 0,  0.7, 0.5, 0.2,  1.0];
  for (let i = 0; i <= n; i++) {
    const a = i / n * 2 * Math.PI;
    base.push(r * Math.cos(a), -h/2, r * Math.sin(a),  0.7, 0.5, 0.2,  1.0);
  }
  // Wachlarz 2: scianki boczne (wierzcholek na gorze, podstawa wokol)
  const sides = [0, h/2, 0,  0.9, 0.7, 0.3,  1.0];
  for (let i = 0; i <= n; i++) {
    const a = i / n * 2 * Math.PI;
    sides.push(r * Math.cos(a), -h/2, r * Math.sin(a),  0.6, 0.3, 0.1,  1.0);
  }
  return { base: makeVAO(base, gl.TRIANGLE_FAN, n + 2),
           sides: makeVAO(sides, gl.TRIANGLE_FAN, n + 2) };
}
const pyr = makePyramid(N);

let objectNumber = 1;
let rotX = 0, rotY = 0, rotZ = 0;

document.addEventListener("keydown", e => {
  if (e.key === "1") objectNumber = 1;
  else if (e.key === "2") objectNumber = 2;
  else if (e.key === "ArrowLeft")  rotY -= 5;
  else if (e.key === "ArrowRight") rotY += 5;
  else if (e.key === "ArrowUp")    rotX -= 5;
  else if (e.key === "ArrowDown")  rotX += 5;
  else if (e.key === "PageUp")     rotZ -= 5;
  else if (e.key === "PageDown")   rotZ += 5;
  else if (e.key === "Home") { rotX = rotY = rotZ = 0; }
  display();
});

function display() {
  gl.clearColor(0.07, 0.07, 0.09, 1.0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  const proj = mat4.create();
  mat4.perspective(proj, Math.PI/4, 800/600, 0.1, 50);
  const view = mat4.create();
  mat4.lookAt(view, [0, 1, 3], [0, 0, 0], [0, 1, 0]);
  const model = mat4.create();
  mat4.rotateX(model, model, rotX * Math.PI / 180);
  mat4.rotateY(model, model, rotY * Math.PI / 180);
  mat4.rotateZ(model, model, rotZ * Math.PI / 180);
  const mvp = mat4.create();
  mat4.multiply(mvp, proj, view);
  mat4.multiply(mvp, mvp, model);
  gl.uniformMatrix4fv(uMVP, false, mvp);

  if (objectNumber === 1) {
    bindBuf(corkVAO);
    gl.drawArrays(corkVAO.mode, 0, corkVAO.count);
  } else {
    // Modelowanie hierarchiczne: 2 wachlarze
    bindBuf(pyr.base);
    gl.drawArrays(pyr.base.mode, 0, pyr.base.count);
    bindBuf(pyr.sides);
    gl.drawArrays(pyr.sides.mode, 0, pyr.sides.count);
  }
}
display();
</script>
</body>
</html>
